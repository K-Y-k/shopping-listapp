<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1 span.icon {
      font-size: 1.8rem;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, outline-color 0.2s;
    }

    .input-row input:focus {
      border-color: #667eea;
      outline: 2px solid #667eea;
      outline-offset: 2px;
    }

    .input-row button {
      padding: 12px 20px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #5a67d8;
    }

    .input-row button:focus-visible {
      outline: 2px solid #667eea;
      outline-offset: 2px;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      font-size: 0.85rem;
      color: #718096;
    }

    .stats .clear-btn {
      background: none;
      border: none;
      color: #e53e3e;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 2px 6px;
      border-radius: 4px;
      transition: background 0.2s;
    }

    .stats .clear-btn:hover {
      background: #fff5f5;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 12px;
      border-radius: 10px;
      transition: background 0.15s;
      border-bottom: 1px solid #f0f4f8;
    }

    li:last-child {
      border-bottom: none;
    }

    li:hover {
      background: #f7fafc;
    }

    li.checked {
      opacity: 0.5;
    }

    li input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #667eea;
      cursor: pointer;
      flex-shrink: 0;
    }

    li .item-name {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      word-break: break-all;
      transition: text-decoration 0.2s;
    }

    li.checked .item-name {
      text-decoration: line-through;
      color: #a0aec0;
    }

    li .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      cursor: pointer;
      font-size: 1.2rem;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
      flex-shrink: 0;
    }

    li .delete-btn:hover {
      color: #e53e3e;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 40px 0;
      font-size: 0.95rem;
    }

    .empty .empty-icon {
      font-size: 3rem;
      display: block;
      margin-bottom: 12px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><span class="icon">🛒</span> 쇼핑 리스트</h1>

    <div class="input-row">
      <label for="itemInput" class="sr-only">아이템 이름</label>
      <input type="text" id="itemInput" placeholder="아이템을 입력하세요..." maxlength="100">
      <button type="button" id="addBtn">추가</button>
    </div>

    <div class="stats" id="stats" style="display:none;">
      <span id="statsText"></span>
      <button type="button" class="clear-btn" id="clearBtn">완료 항목 삭제</button>
    </div>

    <ul id="list"></ul>
    <div class="empty" id="empty">
      <span class="empty-icon">🛍️</span>
      아직 아이템이 없어요.<br>위에서 추가해 보세요!
    </div>
  </div>

  <script>
    function storageAvailable() {
      try {
        const x = '__storage_test__';
        localStorage.setItem(x, x);
        localStorage.removeItem(x);
        return true;
      } catch (e) {
        return false;
      }
    }

    const canStore = storageAvailable();
    let items = [];
    if (canStore) {
      try {
        items = JSON.parse(localStorage.getItem('shoppingList') || '[]');
      } catch (e) {
        items = [];
      }
    }

    const listEl = document.getElementById('list');
    const emptyEl = document.getElementById('empty');
    const statsEl = document.getElementById('stats');
    const statsText = document.getElementById('statsText');
    const input = document.getElementById('itemInput');

    document.getElementById('addBtn').addEventListener('click', addItem);
    document.getElementById('clearBtn').addEventListener('click', clearChecked);

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    function save() {
      if (!canStore) return;
      try {
        localStorage.setItem('shoppingList', JSON.stringify(items));
      } catch (e) {
        console.error('저장 실패 (용량 초과):', e);
      }
    }

    function render() {
      listEl.innerHTML = '';

      if (items.length === 0) {
        emptyEl.style.display = 'block';
        statsEl.style.display = 'none';
        return;
      }

      emptyEl.style.display = 'none';
      statsEl.style.display = 'flex';

      const checked = items.filter(i => i.done).length;
      statsText.textContent = `총 ${items.length}개 · 완료 ${checked}개`;

      items.forEach((item, idx) => {
        const li = document.createElement('li');
        if (item.done) li.classList.add('checked');

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = item.done;
        cb.addEventListener('change', () => toggle(idx));

        const name = document.createElement('span');
        name.className = 'item-name';
        name.textContent = item.name;
        name.addEventListener('click', () => toggle(idx));
        name.style.cursor = 'pointer';

        const del = document.createElement('button');
        del.type = 'button';
        del.className = 'delete-btn';
        del.textContent = '✕';
        del.setAttribute('aria-label', `${item.name} 삭제`);
        del.addEventListener('click', () => remove(idx));

        li.appendChild(cb);
        li.appendChild(name);
        li.appendChild(del);
        listEl.appendChild(li);
      });
    }

    function addItem() {
      const name = input.value.trim();
      if (!name) return;
      items.unshift({ name, done: false });
      input.value = '';
      save();
      render();
    }

    function toggle(idx) {
      items[idx].done = !items[idx].done;
      save();
      render();
    }

    function remove(idx) {
      items.splice(idx, 1);
      save();
      render();
    }

    function clearChecked() {
      items = items.filter(i => !i.done);
      save();
      render();
    }

    render();
  </script>
</body>
</html>
